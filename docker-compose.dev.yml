services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: course-matcher-api-local
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PORT=${PORT:-8000}
      - SUPABASE_URL=http://host.docker.internal:54321
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          memory: 256M

networks:
  app-network:
    driver: bridge