services:
  app:
    image: ${DOCKER_IMAGE:-ikapo/course-matcher-api:latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: course-matcher-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PORT=${PORT:-8000}
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          memory: 256M

  caddy:
    image: caddy:2.7-alpine
    container_name: course-matcher-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - PORT=${PORT:-8000}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_healthy
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          memory: 64M

networks:
  app-network:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
